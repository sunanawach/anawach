<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stanley Nursing Expo Proposal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="#home" data-tab-link="home" aria-label="Stanley Nursing Expo Proposal home">
        <img src="https://www.stanleycollege.edu.au/wp-content/themes/stanleycollege/assets/images/sc-logo.webp" alt="Stanley College logo">
        <span>
          <strong>Stanley Nursing Expo Proposal</strong>
          <small>Website-style presentation</small>
        </span>
      </a>
      <button class="menu-button" id="menuButton" type="button" aria-expanded="false" aria-controls="mainNav">Menu</button>
      <nav class="nav" id="mainNav" aria-label="Presentation sections"></nav>
    </div>
  </header>

  <main>
    <div class="progress-row">
      <div>
        <p id="activeLabel">Home</p>
        <span id="activeSpeaker">Presenter: Ugyen Dema - Project Manager</span>
      </div>
      <strong id="activeCount">1 / 13</strong>
    </div>

    <section class="stage" id="stage" aria-live="polite"></section>

    <div class="controls">
      <button class="control secondary" id="prevButton" type="button">Previous Topic</button>
      <div class="dots" id="dots" aria-label="Section progress"></div>
      <button class="control primary" id="nextButton" type="button">Next Topic</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
